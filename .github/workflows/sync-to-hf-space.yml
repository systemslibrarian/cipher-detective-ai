name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space (demo)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "ci@github-actions"
          git config --global user.name "GitHub Actions"
          git remote add space https://systemslibrarian:${HF_TOKEN}@huggingface.co/spaces/systemslibrarian/cipher-detective-ai
          git push space main --force

      - name: Push training_space/ to HF Training Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 -c "
from huggingface_hub import HfApi
import os
api = HfApi(token=os.environ['HF_TOKEN'])
for fname in ['app.py', 'requirements.txt', 'README.md']:
    api.upload_file(
        path_or_fileobj=f'training_space/{fname}',
        path_in_repo=fname,
        repo_id='systemslibrarian/cipher-detective-training',
        repo_type='space',
        commit_message=f'sync from GitHub: {fname}',
    )
    print(f'Synced {fname}')
"
