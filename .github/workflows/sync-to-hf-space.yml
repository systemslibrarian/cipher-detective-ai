name: Sync to Hugging Face Space

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space (demo)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "ci@github-actions"
          git config --global user.name "GitHub Actions"
          git remote add space https://systemslibrarian:${HF_TOKEN}@huggingface.co/spaces/systemslibrarian/cipher-detective-ai
          git push space main --force

      # NOTE: The training_space/ auto-sync step was removed on 2026-05-11
      # after the cipher-detective-training Space was deleted to stop runaway
      # A10G billing. The trainer code remains in training_space/ for future
      # reference but is no longer auto-deployed. To re-enable training,
      # manually create a new Space and push training_space/ to it once.
